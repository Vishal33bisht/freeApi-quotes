<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-center mb-8 text-gray-800">Quotes Gallery</h1>
        <div id="quotes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Quotes will be loaded here -->
        </div>
        <div class="text-center mt-8">
            <button id="load-more-btn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Load More Quotes
            </button>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const quotesContainer = document.getElementById('quotes-container');
        const loadMoreBtn = document.getElementById('load-more-btn');

        async function fetchQuotes(page = 1) {
            try {
                const response = await fetch(`https://api.freeapi.app/api/v1/public/quotes?page=${page}&limit=10`);
                const data = await response.json();
                return data.data.data;
            } catch (error) {
                console.error('Error fetching quotes:', error);
                return [];
            }
        }

        function createQuoteCard(quote) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow duration-300';
            
            const content = document.createElement('p');
            content.className = 'text-gray-700 mb-4 italic';
            content.textContent = `"${quote.content}"`;
            
            const author = document.createElement('p');
            author.className = 'text-gray-900 font-semibold mb-2';
            author.textContent = `— ${quote.author}`;
            
            const tags = document.createElement('div');
            tags.className = 'flex flex-wrap gap-2';
            quote.tags.forEach(tag => {
                const tagElement = document.createElement('span');
                tagElement.className = 'bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full';
                tagElement.textContent = tag;
                tags.appendChild(tagElement);
            });
            
            card.appendChild(content);
            card.appendChild(author);
            card.appendChild(tags);
            
            return card;
        }

        async function loadQuotes(page = 1) {
            const quotes = await fetchQuotes(page);
            quotes.forEach(quote => {
                const card = createQuoteCard(quote);
                quotesContainer.appendChild(card);
            });
        }

        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            loadQuotes(currentPage);
        });

        // Load initial quotes
        loadQuotes();
    </script>
</body>
</html>
